<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Portfólio - Arthur/Thuko</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700&family=Fira+Code&display=swap"
    rel="stylesheet">
  <link href="./styles/output.css" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="../public/icons/Logo.ico">
</head>

<body class="bg-[var(--color-background)] text-[var(--color-text)] overflow-x-hidden">
  <div id="navbar"></div>

  <section class="relative min-h-[90vh] flex items-center justify-between px-16">

    <div class="absolute inset-0 -z-10">
      <div class="w-full h-full bg-gradient-to-br from-blue-600/20 via-transparent to-cyan-400/20 animate-pulse"></div>
    </div>

    <div class="relative w-1/2 hidden md:flex justify-center">

      <div
        class="w-48 h-48 border-2 border-[var(--color-text)]/20 rounded-2xl flex items-center justify-center absolute left-10 top-10 backdrop-blur-md">
        Foto 1
      </div>

      <div
        class="w-48 h-48 border-2 border-[var(--color-text)]/20 rounded-2xl flex items-center justify-center absolute left-40 top-40 backdrop-blur-md">
        Foto 2
      </div>

    </div>

    <div class="w-full md:w-1/2">

      <p class="mb-2 text-sm text-[var(--color-text)]/70">
        Bem-vindo ao
      </p>

      <p class="mb-4 text-lg">
        Meu Portfólio
      </p>

      <h1 class="text-5xl mb-4 text-[var(--color-primary)]" style="font-family: 'Poppins'">
        Arthur/Thuko
      </h1>

      <p class="text-lg mb-6 text-[var(--color-text)]/80">
        Desenvolvedor Full-Stack | Web/Mobile/Desktop
      </p>

      <div class="flex gap-4">

        <button class="px-6 py-3 rounded-lg bg-[var(--color-primary)] hover:bg-[var(--color-accent)] transition">
          Projetos
        </button>

        <button
          class="px-6 py-3 rounded-lg border border-[var(--color-text)]/20 hover:bg-[var(--color-text)]/10 transition">
          Contato
        </button>

      </div>

    </div>

  </section>

  <div class="flex justify-center pb-6">
    <div class="w-6 h-6 border-b-2 border-r-2 rotate-45 border-[var(--color-text)]/50 animate-bounce"></div>
  </div>

  <script src="./scripts/theme.js"></script>
  <script src="./scripts/components.js"></script>
</body>

</html>
